<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0b0e"/>
      <stop offset="100%" stop-color="#13151a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FF4F00" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FF4F00" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" stroke="#FF4F00" stroke-opacity="0.05" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top eyebrow -->
  <g transform="translate(80, 100)">
    <rect width="240" height="36" rx="18" fill="#FF4F00" fill-opacity="0.14" stroke="#FF4F00" stroke-opacity="0.30"/>
    <circle cx="20" cy="18" r="5" fill="#FF4F00"/>
    <text x="36" y="24" font-family="DM Mono, ui-monospace, monospace" font-size="14" fill="#FF4F00" letter-spacing="0.5">VISUAL SUPPORT, LIVE</text>
  </g>

  <!-- mark + wordmark -->
  <g transform="translate(80, 175)">
    <rect width="58" height="58" rx="12" fill="#FF4F00"/>
    <rect x="14" y="20" width="24" height="22" rx="4" fill="#fff"/>
    <path d="M40 26 L50 21 V41 L40 36 Z" fill="#fff"/>
    <text x="78" y="40" font-family="Plus Jakarta Sans, sans-serif" font-size="34" font-weight="800">
      <tspan fill="#FF4F00">Go</tspan><tspan fill="#edeef2">Show</tspan><tspan fill="#5c6270">Me</tspan>
    </text>
  </g>

  <!-- headline -->
  <text x="80" y="320" font-family="Plus Jakarta Sans, sans-serif" font-size="76" font-weight="800" fill="#edeef2" letter-spacing="-1.5">
    <tspan x="80" dy="0">See the issue.</tspan>
    <tspan x="80" dy="86" fill="#FF4F00">Guide the fix.</tspan>
  </text>

  <!-- sub -->
  <text x="80" y="500" font-family="Plus Jakarta Sans, sans-serif" font-size="26" font-weight="400" fill="#9aa3b2">
    <tspan x="80">No install for the customer. Just a link, their phone</tspan>
    <tspan x="80" dy="36">camera, annotations, chat, voice, and Vision AI.</tspan>
  </text>

  <!-- domain -->
  <text x="80" y="590" font-family="DM Mono, ui-monospace, monospace" font-size="18" fill="#5c6270" letter-spacing="1">GOSHOWMEAPP.COM</text>
</svg>
